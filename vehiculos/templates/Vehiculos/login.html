{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Corralon SMyT</title>
    <link rel="stylesheet" href="{% static 'bootstrap-5.3.8-dist/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        :root {
            --primary: #572671;
            --secondary: #FEE6C4;
            --accent-1: #AA0365;
            --accent-2: #91ABA5;
            --surface: #ffffff;
            --text-muted: #7a7f87;
            --line: #e8e4ee;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "Inter", sans-serif;
            background:
                radial-gradient(circle at top right, rgba(170, 3, 101, 0.08), transparent 38%),
                radial-gradient(circle at bottom left, rgba(87, 38, 113, 0.08), transparent 34%),
                #f4f5f8;
        }

        .login-page {
            width: min(100%, 460px);
            padding: 1rem;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 18px 45px rgba(40, 14, 53, 0.12);
        }

        .brand-logo {
            width: 96px;
            display: block;
            margin: 0 auto 0.75rem;
        }

        .login-title {
            color: #2e3238;
            margin-bottom: 0.25rem;
            font-size: 1.55rem;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .field-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555b63;
            margin-bottom: 0.4rem;
            letter-spacing: 0.015em;
        }

        .form-control,
        .form-select {
            height: 44px;
            border-radius: 10px;
            border: 1px solid #d8dde7;
            font-size: 0.92rem;
            background-color: #f9fafc;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(87, 38, 113, 0.15);
            background-color: #fff;
        }

        .form-check-label {
            color: #5d6269;
            font-size: 0.86rem;
        }

        .btn-primary {
            height: 46px;
            border-radius: 10px;
            background: linear-gradient(135deg, #66308b, var(--primary));
            border: 0;
            font-weight: 600;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(87, 38, 113, 0.25);
            background: linear-gradient(135deg, #5d2c80, #4d2264);
        }

        a {
            color: var(--accent-1);
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 600;
        }

        a:hover {
            color: #7f024c;
            text-decoration: underline;
        }

        .login-footer {
            border-top: 1px solid var(--line);
            margin-top: 1.25rem;
            padding-top: 0.9rem;
            text-align: center;
            color: #9499a2;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <main class="login-page">
        <section class="login-card">
            <div class="text-center mb-3">
                <img class="brand-logo" src="{% static 'Img/CORRALON.png' %}" alt="Logo SMyT">
            </div>

            <h1 class="login-title">Sistema de Control Vehicular</h1>
            <p class="login-subtitle">Gobierno del Estado de Tlaxcala</p>

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                {% if error %}
                <div class="alert alert-danger py-2" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <div class="mb-3">
                    <label for="usuario" class="field-label">Correo Institucional</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" placeholder="usuario@smyt.gob.mx" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="field-label">Contrasena</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contrasena" required>
                </div>

                <div class="mb-3">
                    <label for="rol" class="field-label">Rol</label>
                    <select class="form-select" id="rol" name="rol" required>
                        <option value="administrador">Administrador</option>
                        <option value="operador">Operador</option>
                        <option value="consulta">Consulta</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check m-0">
                        <input type="checkbox" name="connected" class="form-check-input" id="connected">
                        <label for="connected" class="form-check-label">Recordarme</label>
                    </div>
                    <a href="#">Olvide mi contrasena</a>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Iniciar sesion</button>
                </div>
            </form>

            <div class="login-footer">2026 Gobierno del Estado de Tlaxcala</div>
        </section>
    </main>

    <script src="{% static 'bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
