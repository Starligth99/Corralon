<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocalizacion</title>
     <link rel="stylesheet" href="{% static 'bootstrap-5.3.8-dist/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap">
  <style>
    :root {
      --primary: #c62828;
      --secondary: #ffe0b2;
      --accent-1: #ef6c00;
      --accent-2: #fbc02d;
      --brand-900: #7f1d1d;
      --brand-700: #c62828;
      --bg-soft: #e5e7eb;
      --line: #ffe0b2;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --shadow-soft: 0 18px 45px rgba(198, 40, 40, 0.12);
      --font-sans: "Sora", "Segoe UI", sans-serif;
      --font-display: "Space Grotesk", "Sora", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at 12% 10%, rgba(239, 108, 0, 0.10), transparent 44%),
        radial-gradient(circle at 85% 0%, rgba(198, 40, 40, 0.10), transparent 36%),
        radial-gradient(circle at 50% 95%, rgba(251, 192, 45, 0.08), transparent 48%),
        var(--bg-soft);
      color: var(--text-main);
      min-height: 100vh;
      font-family: var(--font-sans);
    }

    .topbar {
      background: linear-gradient(110deg, var(--brand-900), var(--brand-700), #ff9800);
      box-shadow: 0 12px 32px rgba(198, 40, 40, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand-mark {
      height: 48px;
      width: auto;
      filter: drop-shadow(0 10px 16px rgba(198, 40, 40, 0.3));
    }

    .surface {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fff8e1 100%);
      box-shadow: var(--shadow-soft);
    }

    h1, h2, h3, .navbar-brand {
      font-family: var(--font-display);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
    <nav class="navbar navbar-dark topbar py-3">
    <div class="container-fluid px-4">
      <a href="{% url 'dashboard' %}" class="navbar-brand fw-bold d-flex align-items-center gap-2">
        <img src="{% static 'Img/LOGO DE GONAC.jpeg' %}" alt="Logo GONAC" class="brand-mark">
        <span>Sistema de Clientes</span>
      </a>
      <a href="{% url 'clientes_list' %}" class="btn btn-outline-light btn-sm">Volver a clientes</a>
    </div>
  </nav>

  <div class="row-md-3">

  </div>

</body>
</html>
